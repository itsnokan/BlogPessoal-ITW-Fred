<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactos | Frederick Daniel</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Georgia&display=swap" rel="stylesheet">
</head>
<body>
    <header class="glass">
        <nav class="navbar">
            <a href="index.html" class="logo">
                <img src="img/logo.png" alt="Fred Daniel Logo">
                Fred<span>Daniel</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Início</a></li>
                <li><a href="sobre.html">Sobre Mim</a></li>
                <li><a href="index.html">Artigos</a></li>
                <li><a href="contactos.html" class="active">Contactos</a></li>
            </ul>
        </nav>
    </header>

    <main style="padding-top: 4rem;">
        <h2 class="section-title">Entra em Contacto</h2>
        
        <div class="contact-container">
            <!-- Formulário -->
            <form class="contact-form" action="#" method="POST" onsubmit="event.preventDefault(); alert('Mensagem enviada com sucesso!');">
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" placeholder="O teu nome" required>
                </div>
                
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="O teu endereço de email" required>
                </div>
                
                <div class="form-group">
                    <label for="mensagem">Mensagem</label>
                    <textarea id="mensagem" name="mensagem" rows="5" placeholder="A tua mensagem..." required></textarea>
                </div>
                
                <button type="submit" class="btn-submit">Enviar Mensagem</button>
            </form>

            <!-- Info e Mapa -->
            <div class="contact-info">
                <h3>Informações de Contacto</h3>
                <p><i class="fas fa-envelope" style="color: var(--primary-color);"></i> email@estudante.ipcb.pt</p>
                <p><i class="fas fa-phone" style="color: var(--primary-color);"></i> +351 912 345 678</p>
                
                <h4 style="margin-top: 1rem;">A Nossa Localização</h4>
                <div class="map-container">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3039.6918847051394!2d-7.5029304!3d39.8143224!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd3d671c667a421b%3A0xc3434685ff4cebf4!2sInstituto%20Polit%C3%A9cnico%20de%20Castelo%20Branco!5e0!3m2!1spt-PT!2spt!4v1714496420541!5m2!1spt-PT!2spt" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="social-menu">
            <a href="#" target="_blank" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="#" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Frederick Daniel. Trabalho Final de ITW.</p>
        </div>
    </footer>
</body>
</html>
